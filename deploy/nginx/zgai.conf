# ============================================================
# ZGAI 律所智能案件管理系统 — Nginx 生产配置
# 适用: macOS 局域网多人部署 (Homebrew nginx)
# ============================================================
# 安装: brew install nginx
# 检查: nginx -t
# 启动: sudo nginx
# 重载: sudo nginx -s reload
# 停止: sudo nginx -s stop
# ============================================================

upstream zgai_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # 接受任意主机名访问（局域网适用）

    # 字符编码
    charset utf-8;

    # 上传文件大小限制
    client_max_body_size 50M;

    # ============================================================
    # 前端静态资源
    # ============================================================
    location / {
        root /Users/juno/ZGAI/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA 路由回退

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================================
    # 后端 API 代理
    # ============================================================
    location /api/ {
        proxy_pass http://zgai_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 15s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ============================================================
    # H2 Console (开发用)
    # ============================================================
    location /api/h2-console/ {
        proxy_pass http://zgai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================================
    # 错误页
    # ============================================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/local/var/www;
    }
}

