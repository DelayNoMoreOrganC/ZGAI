server:
  port: 8080
  servlet:
    context-path: /api
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

spring:
  application:
    name: lawfirm-backend

  # H2内存数据库配置（开发环境，有DataInitializer自动创建测试数据）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:lawfirm;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-time-timeout: 600000
      max-lifetime: 1800000

  # H2控制台配置（可选）
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
        globally_quoted_identifiers: true
    open-in-view: false
    defer-datasource-initialization: true

# 启用SQL脚本初始化（首次启动时插入测试数据）
  sql:
    init:
      mode: never

  # 完全禁用Redis（开发环境）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# JWT配置
jwt:
  secret: lawfirm-secret-key-2024-spring-boot-jwt-authentication
  expiration: 86400000  # 24小时 (毫秒)
  header: Authorization
  prefix: Bearer

# MinIO配置（开发环境可以注释）
minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: lawfirm
  connectTimeout: 10000
  writeTimeout: 60000
  readTimeout: 10000

# 文件上传配置
file:
  upload-path: D:/ZGAI/uploads/
  max-size: 52428800  # 50MB
  allowed-types:
    - image/jpeg
    - image/png
    - image/gif
    - application/pdf
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/vnd.ms-excel
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    - text/plain

# 登录失败锁定配置
login:
  max-attempts: 5
  lock-duration: 1800000  # 30分钟 (毫秒)

# AI配置
ai:
  deepseek:
    api-key: your-deepseek-api-key
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
    max-tokens: 4000
    temperature: 0.7

# 日志配置
logging:
  level:
    root: INFO
    com.lawfirm: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/lawfirm-backend.log
    max-size: 100MB
    max-history: 30
