spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/zgai}
    username: ${POSTGRES_USER:zgai}
    password: ${POSTGRES_PASSWORD:zgai}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
    open-in-view: false

  sql:
    init:
      mode: never

file:
  case-library-root: ${CASE_FILE_LIBRARY_ROOT:./case-files}
  upload-path: ${FILE_UPLOAD_PATH:./uploads/}

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
