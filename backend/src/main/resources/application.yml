server:
  port: 8080
  address: 0.0.0.0  # 允许局域网访问
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: lawfirm-backend

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/lawfirm;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-time-timeout: 600000
      max-lifetime: 1800000

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
        globally_quoted_identifiers: false
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000
  header: Authorization
  prefix: Bearer

minio:
  enabled: ${MINIO_ENABLED:false}
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
  bucketName: ${MINIO_BUCKET:lawfirm}
  connectTimeout: 10000
  writeTimeout: 60000
  readTimeout: 10000

file:
  upload-path: ${FILE_UPLOAD_PATH:./uploads/}
  frontend-dist-path: ${FRONTEND_DIST_PATH:../frontend/dist/}
  case-library-root: ${CASE_FILE_LIBRARY_ROOT:/Volumes/ZGAI/case-files}
  knowledge-library-root: ${KNOWLEDGE_FILE_LIBRARY_ROOT:/Volumes/ZGAI/knowledge-files}
  max-size: 52428800
  allowed-types:
    - image/jpeg
    - image/png
    - image/gif
    - application/pdf
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/vnd.ms-excel
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    - text/plain

knowledge:
  import:
    firm-policy-source-root: ${FIRM_POLICY_SOURCE_ROOT:/Volumes/律所共享资料/律所制度、章程}
    max-file-size-bytes: ${KNOWLEDGE_IMPORT_MAX_FILE_SIZE_BYTES:52428800}
    staging-root: ${KNOWLEDGE_IMPORT_STAGING_ROOT:./data/knowledge-imports}

login:
  max-attempts: 5
  lock-duration: 1800000

backup:
  base-dir: ${BACKUP_ROOT_PATH:./backups}
  retention-days: ${BACKUP_RETENTION_DAYS:180}
  postgres:
    pg-dump-path: ${PG_DUMP_PATH:pg_dump}
    pg-restore-path: ${PG_RESTORE_PATH:pg_restore}

app:
  seed-demo-data: ${SEED_DEMO_DATA:false}
  initial-admin-password: ${INITIAL_ADMIN_PASSWORD:}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

employee-sync:
  enabled: ${EMPLOYEE_SYNC_ENABLED:false}
  workbook-path: ${EMPLOYEE_SYNC_WORKBOOK:}

permission-bootstrap:
  client-all-view-users: ${CLIENT_ALL_VIEW_USERS:田颖思,黄智明,邝凤兰,何俊慧,吴兴印}
  invoice-processors: ${INVOICE_PROCESSORS:黄智明}
  case-filing-managers: ${CASE_FILING_MANAGERS:田颖思}

yuandian:
  base-url: ${YUANDIAN_BASE_URL:https://open.chineselaw.com}
  api-key: ${YUANDIAN_API_KEY:}
  max-results: ${YUANDIAN_MAX_RESULTS:10}
  cache-minutes: ${YUANDIAN_CACHE_MINUTES:30}

crypto:
  secret-key: ${CRYPTO_SECRET_KEY:}

ai:
  document-intake:
    temp-dir: ${AI_DOCUMENT_INTAKE_TEMP_DIR:./data/document-intake}
    retention-hours: ${AI_DOCUMENT_INTAKE_RETENTION_HOURS:72}
    cleanup-cron: "${AI_DOCUMENT_INTAKE_CLEANUP_CRON:0 30 * * * ?}"
  ocr:
    tesseract-command: ${TESSERACT_COMMAND:tesseract}
    pdftoppm-command: ${PDFTOPPM_COMMAND:pdftoppm}
    language: ${OCR_LANGUAGE:chi_sim+eng}
    max-file-size: ${OCR_MAX_FILE_SIZE:52428800}
    max-pdf-pages: ${OCR_MAX_PDF_PAGES:100}
  lm-studio:
    max-concurrent: ${LM_STUDIO_MAX_CONCURRENT:1}
    queue-wait-seconds: ${LM_STUDIO_QUEUE_WAIT_SECONDS:600}
    retry-count: ${LM_STUDIO_RETRY_COUNT:1}
    retry-delay-millis: ${LM_STUDIO_RETRY_DELAY_MILLIS:1500}
    curl-fallback-enabled: ${LM_STUDIO_CURL_FALLBACK_ENABLED:true}
  deepseek:
    api-key: your-deepseek-api-key
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
    max-tokens: 4000
    temperature: 0.7
  ollama:
    base-url: http://localhost:11434
    model: qwen3:8b
    max-tokens: 2000
    temperature: 0.1
    timeout-seconds: 60
  embedding:
    # Knowledge embeddings stay local by default. Cloud providers require an explicit provider switch.
    provider: ${AI_EMBEDDING_PROVIDER:LM_STUDIO}
    base-url: ${AI_EMBEDDING_BASE_URL:${LM_STUDIO_BASE_URL:http://localhost:1234/v1}}
    api-key: ${AI_EMBEDDING_API_KEY:${LM_STUDIO_API_KEY:}}
    model: ${AI_EMBEDDING_MODEL:}
    dimension: ${AI_EMBEDDING_DIMENSION:1024}
    timeout-seconds: ${AI_EMBEDDING_TIMEOUT_SECONDS:30}
    max-batch-size: ${AI_EMBEDDING_MAX_BATCH_SIZE:25}
    max-input-chars: ${AI_EMBEDDING_MAX_INPUT_CHARS:8000}
    query-prefix: ${AI_EMBEDDING_QUERY_PREFIX:}
    document-prefix: ${AI_EMBEDDING_DOCUMENT_PREFIX:}

qdrant:
  enabled: ${QDRANT_ENABLED:true}
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6333}
  grpc-port: ${QDRANT_GRPC_PORT:6334}
  collection-name: ${QDRANT_COLLECTION_NAME:lawfirm-knowledge}
  vector-size: ${QDRANT_VECTOR_SIZE:${AI_EMBEDDING_DIMENSION:1024}}
  distance: ${QDRANT_DISTANCE:Cosine}
  timeout-seconds: ${QDRANT_TIMEOUT_SECONDS:10}

ac-calc:
  url: http://localhost:5100

legacy:
  case-archive:
    root-path: ${LEGACY_CASE_ARCHIVE_ROOT_PATH:}
    max-scan-results: ${LEGACY_CASE_ARCHIVE_MAX_SCAN_RESULTS:30}
    max-scan-files: ${LEGACY_CASE_ARCHIVE_MAX_SCAN_FILES:100000}

archive:
  worker:
    base-url: ${ARCHIVE_WORKER_BASE_URL:http://127.0.0.1:8091}
    token: ${ARCHIVE_WORKER_TOKEN:}
    timeout-seconds: ${ARCHIVE_WORKER_TIMEOUT_SECONDS:1800}

approval:
  file-root: ${APPROVAL_FILE_ROOT:./data/approval-files}

logging:
  level:
    root: INFO
    com.lawfirm: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/lawfirm-backend.log
    max-size: 100MB
    max-history: 30
