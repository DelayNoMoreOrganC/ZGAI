<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录调试 - 律所系统</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        input { padding: 8px; margin: 5px; font-size: 14px; }
        #result { margin-top: 20px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <h1>🔧 登录功能调试工具</h1>

    <div class="info">
        <strong>测试目标：</strong>验证前端能否正确调用后端API并获取Token
    </div>

    <div style="margin: 20px 0;">
        <label>用户名：</label>
        <input type="text" id="username" value="admin" /><br><br>
        <label>密码：</label>
        <input type="password" id="password" value="admin123" /><br><br>
        <button onclick="runAllTests()">🚀 运行完整测试</button>
    </div>

    <div id="result"></div>

    <script>
        async function runAllTests() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="info">正在测试...</div>';

            let html = '';
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // 测试1：检查当前URL
            html += '<div class="info">✓ 测试1: 当前URL = ' + window.location.href + '</div>';

            // 测试2：检查fetch API可用性
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                html += '<div class="info">✓ 测试2: Fetch API可用</div>';
                html += '<div class="info">✓ 测试3: HTTP状态 = ' + response.status + '</div>';

                if (response.ok) {
                    const data = await response.json();
                    html += '<div class="success">✓ 测试4: 响应解析成功</div>';
                    html += '<div class="success">✓ 测试5: 响应code = ' + data.code + '</div>';

                    if (data.code === 200) {
                        html += '<div class="success">✓✓✓ 测试6: 登录成功！</div>';
                        html += '<div class="success">✓ Token已获取: ' + (data.data?.token?.substring(0, 20) + '...') + '</div>';
                        html += '<div class="success">✓ 用户ID: ' + data.data?.userId + '</div>';
                        html += '<div class="success">✓ 用户名: ' + data.data?.username + '</div>';

                        // 测试7：存储token到localStorage
                        try {
                            localStorage.setItem('token', data.data.token);
                            localStorage.setItem('userInfo', JSON.stringify(data.data));
                            html += '<div class="success">✓ 测试7: localStorage存储成功</div>';
                        } catch (e) {
                            html += '<div class="error">✗ 测试7: localStorage存储失败 - ' + e.message + '</div>';
                        }

                        // 测试8：尝试读取token
                        try {
                            const storedToken = localStorage.getItem('token');
                            if (storedToken) {
                                html += '<div class="success">✓ 测试8: Token读取验证成功</div>';
                            } else {
                                html += '<div class="error">✗ 测试8: Token读取失败 - 未找到token</div>';
                            }
                        } catch (e) {
                            html += '<div class="error">✗ 测试8: Token读取异常 - ' + e.message + '</div>';
                        }

                        html += '<div class="success"><strong>🎉 所有测试通过！登录功能正常。</strong></div>';
                        html += '<div class="info">请访问 <a href="/login">/login</a> 进行实际登录</div>';
                    } else {
                        html += '<div class="error">✗ 测试6: 登录失败 - code=' + data.code + ', message=' + data.message + '</div>';
                    }
                } else {
                    html += '<div class="error">✗ 测试4: HTTP错误 - ' + response.status + ' ' + response.statusText + '</div>';
                }
            } catch (error) {
                html += '<div class="error">✗ 测试2: Fetch异常 - ' + error.message + '</div>';
                html += '<div class="error">详细错误: ' + error.stack + '</div>';
            }

            // 测试9：检查浏览器控制台
            html += '<div class="info">ℹ 测试9: 请按F12打开浏览器控制台，查看是否有JavaScript错误</div>';

            resultDiv.innerHTML = html;
            console.log('=== 调试信息 ===');
            console.log('测试完成，请查看页面结果');
        }

        // 页面加载时自动运行
        window.onload = function() {
            console.log('调试页面已加载');
            console.log('当前URL:', window.location.href);
            console.log('请点击"运行完整测试"按钮');
        };
    </script>
</body>
</html>
